<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ChatGPT活用タイプ診断</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">

<!-- Firebase SDK -->
<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, createUserWithEmailAndPassword, signInWithPopup, GoogleAuthProvider, signOut } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';
import { getFirestore, doc, setDoc, getDoc, collection, query, where, orderBy, getDocs } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

// ▼ ここにFirebaseConfigを貼り付けてください ▼
const firebaseConfig = {

};
// ▲ ここまで ▲

const app      = initializeApp(firebaseConfig);
const auth     = getAuth(app);
const db       = getFirestore(app);
const provider = new GoogleAuthProvider();

// グローバルに公開（app.jsから呼ぶため）
window._fb = { auth, db, provider,
  onAuthStateChanged, signInWithEmailAndPassword, createUserWithEmailAndPassword,
  signInWithPopup, signOut, GoogleAuthProvider,
  doc, setDoc, getDoc, collection, query, where, orderBy, getDocs };
</script>
</head>
<body>

<!-- ── GLOBAL NAV ── -->
<nav class="top-nav" id="top-nav">
  <!-- JS で描画 -->
</nav>

<!-- ── AUTH MODAL ── -->
<div class="modal-overlay" id="auth-modal">
  <div class="modal-box">
    <button class="modal-close" onclick="closeAuthModal()">✕</button>
    <div id="modal-inner"><!-- JS で描画 --></div>
  </div>
</div>

<!-- ══ SCREEN: TOP ══ -->
<section id="screen-top" class="screen active">
  <div style="position:relative;z-index:1;width:100%;max-width:560px;margin:0 auto;">
    <p class="top-eyebrow">ChatGPT 活用タイプ診断</p>
    <h1 class="top-title">あなたにとっての<br>最強の使い方を見つける</h1>
    <p class="top-sub">20問の設問に答えるだけ。あなたのAIとの関わり方のパターンを分析し、価値を最大化するカスタム指示を提案します。</p>
    <div class="top-meta">
      <span class="top-meta-item"><span class="top-meta-dot"></span>所要時間：約3分</span>
      <span class="top-meta-item"><span class="top-meta-dot"></span>全20問</span>
      <span class="top-meta-item"><span class="top-meta-dot"></span>完全無料</span>
    </div>
    <button class="btn-primary" onclick="startQuiz()">
      診断をはじめる
      <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
    </button>
    <div class="axis-preview" style="margin-top:48px;">
      <div class="axis-chip">
        <div class="axis-chip-label" style="color:var(--accent2)">軸 1</div>
        <div class="axis-chip-name">出力への期待</div>
        <div class="axis-chip-desc">収束型 ← → 拡張型</div>
      </div>
      <div class="axis-chip">
        <div class="axis-chip-label" style="color:var(--teal)">軸 2</div>
        <div class="axis-chip-name">対話スタイル</div>
        <div class="axis-chip-desc">一発型 ← → 往復型</div>
      </div>
      <div class="axis-chip">
        <div class="axis-chip-label" style="color:var(--coral)">軸 3</div>
        <div class="axis-chip-name">回答への姿勢</div>
        <div class="axis-chip-desc">検証型 ← → 支援型</div>
      </div>
      <div class="axis-chip">
        <div class="axis-chip-label" style="color:var(--amber)">軸 4</div>
        <div class="axis-chip-name">主体性</div>
        <div class="axis-chip-desc">代行型 ← → 協働型</div>
      </div>
    </div>
  </div>
</section>

<!-- ══ SCREEN: QUIZ ══ -->
<section id="screen-quiz" class="screen">
  <header class="quiz-header">
    <span class="quiz-logo">AI診断</span>
    <div class="progress-bar-wrap">
      <div class="progress-bar-fill" id="progress-fill"></div>
    </div>
    <span class="progress-count" id="progress-count">1 / 20</span>
  </header>
  <div class="quiz-body">
    <div class="q-card fade-up" id="q-card">
      <!-- JS で生成 -->
    </div>
  </div>
</section>

<!-- ══ SCREEN: MEMBER DETAIL ══ -->
<section id="screen-member" class="screen">
  <div class="member-wrap fade-up" id="member-content">
    <!-- JS で生成 -->
  </div>
</section>

<!-- ══ SCREEN: RESULT ══ -->
<section id="screen-result" class="screen">
  <div class="result-wrap fade-up" id="result-content">
    <!-- JS で生成 -->
  </div>
</section>

<script src="js/app.js"></script>
</body>
</html>
